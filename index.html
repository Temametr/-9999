<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brick Game TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #2c2c2c; color: #333; font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
            overflow: hidden; touch-action: none;
        }
        .console {
            background-color: #e0e0e0; padding: 20px 15px 30px 15px; border-radius: 15px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), inset 5px 5px 15px rgba(255,255,255,0.8);
            display: flex; flex-direction: column; align-items: center; max-width: 100%;
        }
        .screen-bezel {
            background-color: #555; padding: 10px; border-radius: 10px; margin-bottom: 15px;
            border-top: 3px solid #333; border-left: 3px solid #333; border-bottom: 3px solid #777; border-right: 3px solid #777;
        }
        .screen {
            background-color: #8b956d; box-shadow: inset 3px 3px 10px rgba(0,0,0,0.3);
            display: flex; padding: 8px; gap: 10px; position: relative;
        }
        canvas { display: block; }
        #gameCanvas { border: 2px solid #111; }
        #nextCanvas { border: 2px solid #111; background-color: transparent; margin-top: 5px; }
        .sidebar { display: flex; flex-direction: column; width: 80px; }
        .info-box { margin-bottom: 15px; font-weight: bold; font-size: 14px; text-align: right; color: #111; }
        .info-value { font-size: 18px; margin-top: 3px; }
        .system-buttons { display: flex; justify-content: space-around; width: 100%; margin-bottom: 15px; gap: 10px; }
        .sys-btn {
            background-color: #d12c2c; color: white; border: none; border-radius: 20px;
            padding: 8px 15px; font-family: inherit; font-weight: bold; font-size: 14px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(0,0,0,0.3); cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .sys-btn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); transform: scale(0.95); }
        .controls-panel { display: flex; justify-content: space-between; width: 100%; padding: 0 10px; box-sizing: border-box; }
        .d-pad { display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px 50px; gap: 5px; }
        .action-buttons { display: flex; align-items: center; justify-content: center; padding-top: 30px; }
        .btn {
            background-color: #d12c2c; border-radius: 50%; border: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(0,0,0,0.3);
            color: white; font-weight: bold; font-size: 20px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); transform: scale(0.95); }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
        .btn-rotate { width: 80px; height: 80px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="console">
        <div class="screen-bezel">
            <div class="screen">
                <canvas id="gameCanvas" width="200" height="400"></canvas>
                <div class="sidebar">
                    <div class="info-box">СЧЕТ<div class="info-value" id="score">0</div></div>
                    <div class="info-box">РЕЖИМ<div class="info-value" id="lines">MENU</div></div>
                    <div class="info-box">СЛЕД.<canvas id="nextCanvas" width="80" height="80"></canvas></div>
                </div>
            </div>
        </div>
        
        <div class="system-buttons">
            <button class="sys-btn" id="btn-menu">МЕНЮ</button>
            <button class="sys-btn" id="btn-start">СТАРТ</button>
        </div>
        
        <div class="controls-panel">
            <div class="d-pad">
                <button class="btn btn-up" id="btn-up">▲</button>
                <button class="btn btn-left" id="btn-left">◀</button>
                <button class="btn btn-right" id="btn-right">▶</button>
                <button class="btn btn-down" id="btn-down">▼</button>
            </div>
            <div class="action-buttons">
                <button class="btn btn-rotate" id="btn-rotate">A / B</button>
            </div>
        </div>
    </div>
    <!-- ПОДКЛЮЧАЕМ КАК МОДУЛЬ -->
    <script type="module" src="main.js"></script>
</body>
</html>
